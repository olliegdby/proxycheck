name: Update Proxy List

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run updater
        run: python update.py

      - name: Update via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT=$(cat proxies.json | jq -sR .)
          SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/olliegdby/proxycheck/contents/proxies.json | jq -r '.sha')
          curl -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"Update proxies\",\"content\":$CONTENT,\"sha\":\"$SHA\"}" \
            https://api.github.com/repos/olliegdby/proxycheck/contents/proxies.json
